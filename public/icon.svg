<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="aurora-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e9d5ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#fbcfe8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cffafe;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background with Aurora gradient -->
  <rect width="512" height="512" rx="128" fill="url(#aurora-gradient)"/>

  <!-- Letter "T" for Turn -->
  <text
    x="256"
    y="350"
    font-family="Roboto, Arial, sans-serif"
    font-size="280"
    font-weight="300"
    fill="#164e63"
    text-anchor="middle"
  >T</text>
</svg>
